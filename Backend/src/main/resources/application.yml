spring:
  application:
    name: Backends
  main:
    web-application-type: servlet
  datasource:
    url: ${DATABASE_URL}
    # username: ${DB_USERNAME}
    # password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 5
      idle-timeout: 300000
      max-lifetime: 1700000
      connection-timeout: 30000
  data:
    redis:
      url: ${REDIS_URL}
      timeout: 2000ms
      ssl:
        enabled: true
      lettuce:
        pool:
          max-active: 8
          max-idle: 8
          min-idle: 0
  jpa:
    hibernate:
      ddl-auto: validate
#    properties:
#      hibernate:
#        format_sql: true
#        show_sql: true  # ✅ Added to see SQL in console
#      # ✅ Use JPA standard properties (not hibernate.hbm2ddl)
#      jakarta.persistence.schema-generation.scripts.action: create
#      jakarta.persistence.schema-generation.scripts.create-target: schema.sql
#      jakarta.persistence.schema-generation.scripts.create-source: metadata
  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: classpath:db/migration
  profiles:
    default: dev

management:
  endpoints:
    web:
      exposure:
        include: health, info, metrics, prometheus
        exclude: env,beans
  endpoint:
    health:
      show-details: always

security:
  jwt:
    secret: ${SECURITY_JWT_SECRET:change-me-please-min-32-characters}
    expiration: ${SECURITY_JWT_EXPIRATION:864000000}
server:
  port: ${PORT:8080}
  address: 0.0.0.0

tmdb:
  api:
    base-url: https://api.themoviedb.org/3
    api-token: ${TMDB_API_TOKEN:${TMDB_API_KEY:}}
    retry:
      attempts: ${TMDB_API_RETRY_ATTEMPTS:3}
      backoff-ms: ${TMDB_API_RETRY_BACKOFF_MS:200}
    rate-limit:
      capacity: ${TMDB_API_RATE_LIMIT_CAPACITY:40}
      refill-tokens: ${TMDB_API_RATE_LIMIT_REFILL_TOKENS:40}
      refill-period-seconds: ${TMDB_API_RATE_LIMIT_REFILL_PERIOD_SECONDS:10}

recommendation:
  sync:
    max-similar-per-film: ${RECOMMENDATION_SYNC_MAX_SIMILAR_PER_FILM:20}
    max-requests-per-run: ${RECOMMENDATION_SYNC_MAX_REQUESTS_PER_RUN:8}
    defer-delay-ms: ${RECOMMENDATION_SYNC_DEFER_DELAY_MS:5000}
    similar-followup-delay-ms: ${RECOMMENDATION_SYNC_SIMILAR_FOLLOWUP_DELAY_MS:10000}
    allow-partial-bootstrap: ${RECOMMENDATION_SYNC_ALLOW_PARTIAL_BOOTSTRAP:true}
    scheduler:
      max-tasks-per-tick: ${RECOMMENDATION_SYNC_SCHEDULER_MAX_TASKS_PER_TICK:5}
      reserved-tokens: ${RECOMMENDATION_SYNC_SCHEDULER_RESERVED_TOKENS:6}
  scoring:
    new-release-days: ${RECOMMENDATION_SCORING_NEW_RELEASE_DAYS:365}
    new-release-boost: ${RECOMMENDATION_SCORING_NEW_RELEASE_BOOST:0.5}