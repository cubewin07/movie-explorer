spring:
  application:
    name: Backends
  main:
    web-application-type: servlet
  datasource:
    url: ${DATABASE_URL}
    # username: ${DB_USERNAME}
    # password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: ${DB_HIKARI_MAX_POOL_SIZE:5}
      minimum-idle: ${DB_HIKARI_MIN_IDLE:1}
      idle-timeout: ${DB_HIKARI_IDLE_TIMEOUT_MS:300000}
      max-lifetime: ${DB_HIKARI_MAX_LIFETIME_MS:1700000}
      connection-timeout: ${DB_HIKARI_CONNECTION_TIMEOUT_MS:60000}
  data:
    redis:
      url: ${REDIS_URL}
      timeout: 2000ms
      ssl:
        enabled: true
      lettuce:
        pool:
          max-active: ${REDIS_POOL_MAX_ACTIVE:4}
          max-idle: ${REDIS_POOL_MAX_IDLE:2}
          min-idle: ${REDIS_POOL_MIN_IDLE:0}
  jpa:
    hibernate:
      ddl-auto: validate
#    properties:
#      hibernate:
#        format_sql: true
#        show_sql: true  # ✅ Added to see SQL in console
#      # ✅ Use JPA standard properties (not hibernate.hbm2ddl)
#      jakarta.persistence.schema-generation.scripts.action: create
#      jakarta.persistence.schema-generation.scripts.create-target: schema.sql
#      jakarta.persistence.schema-generation.scripts.create-source: metadata
  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: classpath:db/migration
  profiles:
    default: dev

management:
  endpoints:
    web:
      exposure:
        include: health, info, metrics, prometheus
        exclude: env,beans
  endpoint:
    health:
      show-details: always

security:
  jwt:
    secret: ${SECURITY_JWT_SECRET:change-me-please-min-32-characters}
    expiration: ${SECURITY_JWT_EXPIRATION:864000000}
server:
  port: ${PORT:8080}
  address: 0.0.0.0
  connection-timeout: ${SERVER_CONNECTION_TIMEOUT:30s}
  tomcat:
    accept-count: ${SERVER_TOMCAT_ACCEPT_COUNT:50}
    threads:
      max: ${SERVER_TOMCAT_THREADS_MAX:20}
      min-spare: ${SERVER_TOMCAT_THREADS_MIN_SPARE:5}

tmdb:
  api:
    base-url: https://api.themoviedb.org/3
    api-token: ${TMDB_API_TOKEN:${TMDB_API_KEY:}}
    retry:
      attempts: ${TMDB_API_RETRY_ATTEMPTS:3}
      backoff-ms: ${TMDB_API_RETRY_BACKOFF_MS:500}
    rate-limit:
      capacity: ${TMDB_API_RATE_LIMIT_CAPACITY:1000}
      refill-tokens: ${TMDB_API_RATE_LIMIT_REFILL_TOKENS:1000}
      refill-period-seconds: ${TMDB_API_RATE_LIMIT_REFILL_PERIOD_SECONDS:1}

recommendation:
  query:
    max-candidates: ${RECOMMENDATION_QUERY_MAX_CANDIDATES:0}
  sync:
    max-similar-per-film: ${RECOMMENDATION_SYNC_MAX_SIMILAR_PER_FILM:500}
    max-requests-per-run: ${RECOMMENDATION_SYNC_MAX_REQUESTS_PER_RUN:200}
    defer-delay-ms: ${RECOMMENDATION_SYNC_DEFER_DELAY_MS:5000}
    similar-followup-enabled: ${RECOMMENDATION_SYNC_SIMILAR_FOLLOWUP_ENABLED:true}
    similar-followup-delay-ms: ${RECOMMENDATION_SYNC_SIMILAR_FOLLOWUP_DELAY_MS:10000}
    allow-partial-bootstrap: ${RECOMMENDATION_SYNC_ALLOW_PARTIAL_BOOTSTRAP:true}
    scheduler:
      max-tasks-per-tick: ${RECOMMENDATION_SYNC_SCHEDULER_MAX_TASKS_PER_TICK:100}
      reserved-tokens: ${RECOMMENDATION_SYNC_SCHEDULER_RESERVED_TOKENS:0}
  scoring:
    new-release-days: ${RECOMMENDATION_SCORING_NEW_RELEASE_DAYS:365}
    new-release-boost: ${RECOMMENDATION_SCORING_NEW_RELEASE_BOOST:0.5}

watchlist:
  sync:
    apply-heavy-backfill: ${WATCHLIST_SYNC_APPLY_HEAVY_BACKFILL:true}
    executor:
      core-pool-size: ${WATCHLIST_SYNC_EXECUTOR_CORE_POOL_SIZE:4}
      max-pool-size: ${WATCHLIST_SYNC_EXECUTOR_MAX_POOL_SIZE:16}
      queue-capacity: ${WATCHLIST_SYNC_EXECUTOR_QUEUE_CAPACITY:5000}

app:
  async:
    executor:
      core-pool-size: ${APP_ASYNC_CORE_POOL_SIZE:4}
      max-pool-size: ${APP_ASYNC_MAX_POOL_SIZE:16}
      queue-capacity: ${APP_ASYNC_QUEUE_CAPACITY:5000}
      thread-name-prefix: ${APP_ASYNC_THREAD_NAME_PREFIX:app-async-}
  scheduling:
    pool-size: ${APP_SCHEDULING_POOL_SIZE:8}
    thread-name-prefix: ${APP_SCHEDULING_THREAD_NAME_PREFIX:app-scheduler-}
  recommendation:
    followup-executor:
      core-pool-size: ${APP_RECOMMENDATION_FOLLOWUP_CORE_POOL_SIZE:4}
      max-pool-size: ${APP_RECOMMENDATION_FOLLOWUP_MAX_POOL_SIZE:16}
      queue-capacity: ${APP_RECOMMENDATION_FOLLOWUP_QUEUE_CAPACITY:5000}
      thread-name-prefix: ${APP_RECOMMENDATION_FOLLOWUP_THREAD_NAME_PREFIX:recommendation-followup-}
